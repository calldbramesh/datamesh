name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force delete database from Git tracking before sync
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          rm -f hr_mesh.db
          git rm --cached hr_mesh.db || true
          git commit -m "Remove tracking for db file" || true

      - uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: calldbramesh/datamesh
          hf_token: ${{ secrets.HF_TOKEN }}
